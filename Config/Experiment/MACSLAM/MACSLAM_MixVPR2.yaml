#
# This configuration is **not** used to report numbers in the paper.
# To reproduce result in the paper, please use Paper_Reproduce.yaml
#
#
# MAC-VO Fast Mode (Jun 2025 Update)
#   Comparing to the Performant mode (MACVO_Performant), the Fast Mode uses 
#   mixed-precision inference of fp32, fp16 and bf16. The fast mode can run
#   at 12.5fps on 480x640 images on RTX Ada 6000 GPU, almost twice the speed
#   as Performant Mode.
#   
#   If minor degrade in accuracy (~5% increase in RTE and ROE) is acceptable,
#   then you should use Fast Mode for most of the time.
# 

Common:
  # Some configurations are shared across multiple modules in Odometry, so I write them here.
  device: &device cuda

Odometry:
  name: MACSLAM-MixVPR
  args:
    # Device directive to the VO system
    # NOTE: the system may not follow this device config strictly since some module
    # e.g. those rely on PWC-Net, only support running on cuda device.
    device: *device
    edgewidth: 32
    num_point: 200 # Upper bound of KPs in each frame

    # Match covariance for keypoint on first observation (sub-pixel uncertainty
    # caused by the quantized pixel)
    match_cov_default: 0.25

    # Profiling the system using torch, generate chrome json trace file.
    profile: false

    # Mapping mode provides the dense mapping
    mapping: true

  cov:
    obs:
      type: MatchCovariance
      args:
        device: *device
        kernel_size: 31
        match_cov_default: 0.25
        min_depth_cov: 0.05
        min_flow_cov: 0.25

  keypoint:
    type: CovAwareSelector_NoDepth
    args:
      device: *device
      kernel_size: 7
      mask_width: 32
      max_match_cov: 100.0

  mappoint:
    # Mapping feature can be conveniently turn off by using 
    # "type: NoKeypointSelector" instead of the config below.
    type: MappingPointSelector
    args:
      device: *device
      max_depth: 5.0
      max_depth_cov: 0.005
      mask_width: 32

  frontend:
    type: CUDAGraph_FlowFormerCovFrontend
    args:
      device: *device
      weight: ./Model/MACVO_FrontendCov.pth
      enc_dtype: fp16
      dec_dtype: bf16
      decoder_depth: 12
      enforce_positive_disparity: false

  motion:
    type: StaticMotionModel
    args:

  outlier:
    type: CovarianceSanityFilter
    args:
  
  postprocess:
    type: MotionInterpolate
    args:
  
  keyframe:
    type: AllKeyframe
    args:
  
  optimizer:
    type: TwoFrame_PGO
    args:
      device: cpu
      vectorize: true
      parallel: true
      graph_type: disp
      autodiff: false

Data: !include ../../Sequence/TartanAir_example.yaml
Preprocess: !include ../Common/Preprocess.yaml


# ──────────────────────────────────────────────────────────────────────
# MAC-SLAM extensions
# ──────────────────────────────────────────────────────────────────────
SLAM:
  # Place-recognition for loop closure candidate retrieval
  loop_closure:
    type: MixVPRLoopDetector
    args:
      device: *device
      # weight_path: ./Model/resnet50_MixVPR_4096_channels(1024)_rows(4).ckpt
      threshold: 0.5           # cosine similarity threshold (MixVPR is better
                                # calibrated; 0.70 is selective enough)
      top_k: 3                  # max candidates per query
      min_gap: 80               # frames; KITTI 00 loop ~ 1500-frame gap
      # Geometric verification (ORB + Essential Matrix RANSAC)
      orb_features: 1000
      match_ratio: 0.75         # Lowe's ratio test
      ransac_threshold: 1.0     # pixels
      geometric_min_inliers: 30
      geometric_min_inlier_ratio: 0.25

  # Asynchronous global pose-graph optimiser
  global_pgo:
    lambda_switch: 1.0          # switchable constraint penalty
    max_iterations: 50          # LM iterations per solve
    huber_delta: 0.5
    device: cpu                 # sparse graph → CPU is fine

  # Orchestrator behaviour
  lc_min_gap: 80                # must match loop_closure.args.min_gap
  lc_geometric_threshold: 0.25  # fallback for detectors without geometric_verify
  keyframe_freq: 5              # encode every N-th frame for VPR
  apply_correction: true        # propagate δT after global solve

Preprocess:
  - type: SmartResizeFrame
    args:
      height: 376
      width: 780
      interp: nearest